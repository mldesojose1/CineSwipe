# CI pipeline para CineSwipe
# Corre en push a main y en pull requests apuntando a main.
# Secuencia: lint → test → build (cada job bloquea al siguiente si falla).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones anteriores del mismo PR/branch para no desperdiciar minutos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1 · lint
  # Verifica estilo y reglas ESLint sobre todo el código TypeScript/TSX.
  # --max-warnings 0 hace que cualquier warning rompa el pipeline.
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # La clave incluye el SO y el hash de package.json.
      # Si package.json no cambió, node_modules se restaura del cache
      # y el paso "Instalar dependencias" se salta.
      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Instalar dependencias
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Ejecutar ESLint
        run: npm run lint

  # ──────────────────────────────────────────────────────────
  # JOB 2 · test
  # Corre Vitest en modo CI (sin watcher).
  # Solo se ejecuta si lint pasó (needs: lint).
  #
  # SEGURIDAD: VITE_TMDB_KEY recibe un valor placeholder deliberado.
  # Los tests deben mockear fetch; nunca deben hacer llamadas reales a TMDB.
  # La key real de producción jamás se expone aquí.
  # ──────────────────────────────────────────────────────────
  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    needs: lint

    env:
      VITE_TMDB_KEY: test_key_placeholder

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Instalar dependencias
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Ejecutar tests
        run: npm test

  # ──────────────────────────────────────────────────────────
  # JOB 3 · build
  # Solo corre si lint Y test pasaron (needs: [lint, test]).
  # Compila TypeScript y empaqueta con Vite.
  # El artifact dist/ queda disponible 7 días para inspección o deploy manual.
  #
  # VITE_TMDB_KEY se lee de los Secrets del repositorio (Settings → Secrets).
  # Si el secret no está configurado, el build usará string vacío;
  # el HTML se generará igual pero las llamadas a TMDB fallarán en runtime.
  # ──────────────────────────────────────────────────────────
  build:
    name: Build (Vite)
    runs-on: ubuntu-latest
    needs: [lint, test]

    env:
      VITE_TMDB_KEY: ${{ secrets.VITE_TMDB_KEY }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Instalar dependencias
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Compilar proyecto
        run: npm run build

      # Sube dist/ como artifact nombrado con el SHA del commit
      # para trazabilidad: cada build queda vinculado a su commit exacto.
      - name: Subir artifact dist/
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
